<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AG Couple Private Site</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="panel memories" id="privatePage">

<img src="sakurakiri.png" class="sakura left">
<img src="sakurakanan.png" class="sakura right">

<h2>AG COUPLE PRIVATE SITE</h2>

<p id="loggedUser"></p>

<button id="startCallBtn">
Start Voice Call
</button>

<button id="logoutBtn">
Logout
</button>

</section>

<!-- =========================
     CALL POPUP
========================= -->

<div id="callPopup">

<div class="call-box">

<h2 id="callText"></h2>

<img
id="callImage"
src=""
alt="call image"
>

<div id="incomingButtons">

<button
id="acceptBtn"
class="pink-btn"
>
ACCEPT
</button>

<button
id="rejectBtn"
class="pink-btn"
>
DON'T REJECT
</button>

</div>

<button
id="closeCallPopup"
class="pink-btn"
>
END CALL
</button>

<!-- REAL VOICE AUDIO -->
<audio
id="remoteAudio"
autoplay
></audio>

</div>

</div>

<script>

/* =========================
   AUTH
========================= */

const user =
localStorage.getItem(
"loggedInUser"
);

if (!user) {

window.location.href =
"index.html";

}

/* =========================
   UI INIT
========================= */

document.getElementById(
"loggedUser"
).textContent =
"Logged in as: " + user;

setTimeout(() => {

document
.getElementById("privatePage")
.classList.add("show");

},300);

/* =========================
   LOGOUT
========================= */

document
.getElementById("logoutBtn")
.onclick = () => {

localStorage.removeItem(
"loggedInUser"
);

window.location.href =
"index.html";

};

</script>

<!-- =========================
     REAL CALL SYSTEM
========================= -->

<audio
id="connectedSound"
src="connected.mp3"
preload="auto"
></audio>
     
<script
type="module"
src="call.js"
></script>

</body>
</html>
