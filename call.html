<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AG Couple Private Site</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="panel memories" id="privatePage">

<img src="sakurakiri.png" class="sakura left">
<img src="sakurakanan.png" class="sakura right">

<h2>AG COUPLE PRIVATE SITE</h2>

<p id="loggedUser"></p>

<button id="startCallBtn">Start Voice Call</button>
<button id="logoutBtn">Logout</button>

</section>

<!-- ========================= -->
<!-- CALL POPUP -->
<!-- ========================= -->

<div id="callPopup">

  <div class="call-box">

    <h2 id="callText"></h2>

    <img id="callImage" src="" alt="call image">

    <div id="incomingButtons">

      <button id="acceptBtn" class="pink-btn">
        ACCEPT
      </button>

      <button id="rejectBtn" class="pink-btn">
        DON'T REJECT
      </button>

    </div>

    <button id="closeCallPopup" class="pink-btn">
      END CALL
    </button>

    <!-- audio voice -->
    <audio id="remoteAudio" autoplay></audio>

  </div>

</div>

<!-- ========================= -->
<!-- AUDIO -->
<!-- ========================= -->

<audio id="ringtone" src="ringing.mp3" loop></audio>

<audio id="connectedSound" src="connected.mp3"></audio>

<script>

const user = localStorage.getItem("loggedInUser");

if (!user) {
  window.location.href = "index.html";
}

document.getElementById("loggedUser").textContent =
"Logged in as: " + user;

setTimeout(() => {
  document.getElementById("privatePage").classList.add("show");
}, 300);

document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem("loggedInUser");
  window.location.href = "index.html";
};

const popup = document.getElementById("callPopup");

const callText = document.getElementById("callText");
const callImage = document.getElementById("callImage");

const incomingButtons =
document.getElementById("incomingButtons");

const ringtone =
document.getElementById("ringtone");

const connectedSound =
document.getElementById("connectedSound");

const acceptBtn =
document.getElementById("acceptBtn");

const rejectBtn =
document.getElementById("rejectBtn");

const closeBtn =
document.getElementById("closeCallPopup");

/* ========================= */
/* START CALL */
/* ========================= */

document.getElementById("startCallBtn").onclick = async () => {

  popup.classList.add("show");

  incomingButtons.style.display = "none";

  if (user === "ayah") {

    callText.textContent = "CALLING BUNDA...";
    callImage.src = "ayahringing.jpg";

  } else {

    callText.textContent = "CALLING AYAH...";
    callImage.src = "bundaringing.jpg";

  }

  ringtone.play();

  // trigger WebRTC
  if (window.startVoiceCall) {
    await window.startVoiceCall();
  }
};

/* ========================= */
/* FAKE INCOMING CALL */
/* ========================= */

/*
INI NANTI BISA LU PANGGIL
DARI FIREBASE REALTIME EVENT
*/

window.showIncomingCall = (caller) => {

  popup.classList.add("show");

  incomingButtons.style.display = "flex";

  if (caller === "ayah") {

    callText.textContent = "Ayah is calling...";
    callImage.src = "ayahringing.jpg";

  } else {

    callText.textContent = "Bunda is calling...";
    callImage.src = "bundaringing.jpg";

  }

  ringtone.play();
};

/* ========================= */
/* CONNECTED STATE */
/* ========================= */

function connectCall() {

  ringtone.pause();
  ringtone.currentTime = 0;

  connectedSound.play();

  incomingButtons.style.display = "none";

  callText.textContent = "CONNECTED";

  callImage.src = "imageoncall.jpg";
}

/* ACCEPT */
acceptBtn.onclick = () => {
  connectCall();
};

/* DON'T REJECT */
rejectBtn.onclick = () => {
  connectCall();
};

/* ========================= */
/* END CALL */
/* ========================= */

closeBtn.onclick = () => {

  popup.classList.remove("show");

  ringtone.pause();
  ringtone.currentTime = 0;

  if (window.endCall) {
    window.endCall();
  }
};

</script>

<script type="module" src="call.js"></script>

</body>
</html>
